# Release pipeline — calls BuildSpace's reusable typescript-service-release
# workflow. Trigger model: merge a PR carrying the `release` label, and the
# reusable workflow handles version bump, GitHub Release, and npm publish.
#
# Required repo secrets:
#   - OPENAI_API_KEY  (AI versioning + release notes)
#   - NPM_TOKEN       (npm publish)
#
# To do a one-off prerelease, label the PR `prerelease` instead of `release`.
# To smoke-test without publishing, temporarily add `dry-run: true` under
# `with:` below.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    uses: photon-hq/buildspace/.github/workflows/typescript-service-release.yaml@v1
    with:
      service-name: "@yanxue06/obsidian-mcp"
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
