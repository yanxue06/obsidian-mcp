name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include the prompt you gave the model, if relevant.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps to reproduce. The smaller the vault used, the better.
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: "Claude Desktop 0.x / Cursor / Cline / ..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: obsidian-mcp version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian + Local REST API plugin version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Anything from the MCP client's stderr / Obsidian's developer console.
      render: shell
