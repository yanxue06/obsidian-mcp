name: Feature request
description: Suggest a new tool, parameter, or behavior.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the underlying problem?
      description: Describe the workflow you're trying to do, not the implementation you have in mind.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
