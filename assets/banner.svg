<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="obsidian-mcp — your Obsidian vault as a knowledge graph, queryable by any MCP-compatible AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15102b"/>
      <stop offset="1" stop-color="#2c1860"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <circle cx="940" cy="170" r="240" fill="url(#glow)"/>

  <g stroke="#3b2a6e" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <g stroke="#7c5fd0" stroke-width="1.4" opacity="0.75" fill="none" stroke-linecap="round">
    <line x1="870"  y1="80"  x2="965"  y2="165"/>
    <line x1="965"  y1="165" x2="1075" y2="100"/>
    <line x1="965"  y1="165" x2="1055" y2="245"/>
    <line x1="965"  y1="165" x2="855"  y2="225"/>
    <line x1="855"  y1="225" x2="760"  y2="265"/>
    <line x1="1075" y1="100" x2="1140" y2="190"/>
    <line x1="1055" y1="245" x2="1140" y2="190"/>
    <line x1="870"  y1="80"  x2="770"  y2="75"/>
  </g>
  <g fill="#ddd6fe" stroke="#a78bfa" stroke-width="1.5">
    <circle cx="965"  cy="165" r="11"/>
    <circle cx="870"  cy="80"  r="6"/>
    <circle cx="1075" cy="100" r="6"/>
    <circle cx="1055" cy="245" r="6"/>
    <circle cx="855"  cy="225" r="6"/>
    <circle cx="760"  cy="265" r="5"/>
    <circle cx="1140" cy="190" r="5"/>
    <circle cx="770"  cy="75"  r="5"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <text x="72" y="138" font-size="68" font-weight="700" fill="url(#textGrad)">obsidian-mcp</text>
    <text x="74" y="184" font-size="22" font-weight="500" fill="#c4b5fd">Your Obsidian vault as a knowledge graph,</text>
    <text x="74" y="214" font-size="22" font-weight="500" fill="#c4b5fd">queryable by any MCP-compatible AI.</text>
    <text x="74" y="266" font-size="13" fill="#9b8fd1" letter-spacing="3">25 TOOLS · GRAPH-AWARE · LOCAL-FIRST</text>
  </g>
</svg>
